
services:
  traefik:
    image: traefik:latest
    container_name: traefik
    restart: unless-stopped

    command:
      - "--api.dashboard=true"
      - "--providers.file.directory=/dynamic"
      - "--providers.file.watch=true"

      # HTTP only
      - "--entrypoints.web.address=:80"

    ports:
      - "80:80"

    volumes:
      - ./dynamic:/dynamic
      - /var/run/docker.sock:/var/run/docker.sock:ro

    environment:
      - TZ=America/New_York

networks:
  default:
    name: traefik
