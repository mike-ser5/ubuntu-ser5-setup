services:
  immich-server:
    image: ghcr.io/immich-app/immich-server:v1.97.1
    container_name: immich-server
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    volumes:
      - ./library:/app/library
    ports:
      - "2283:2283"
    networks:
      - traefik

  immich-machine-learning:
    image: ghcr.io/immich-app/immich-machine-learning:v1.97.1
    container_name: immich-ml
    restart: unless-stopped
    environment:
      - TZ=America/New_York
    volumes:
      - ./model-cache:/cache
    networks:
      - traefik

networks:
  traefik:
    external: true
